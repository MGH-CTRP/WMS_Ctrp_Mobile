<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WMS Viewer">
<meta name="theme-color" content="#2d6a4f">
<link rel="manifest" href="manifest.json">
<title>WMS Citeureup Mobile Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ee; --bg2:#eceae6; --bg3:#e4e1dc;
  --surface:#ffffff; --surface2:#f0ede8;
  --border:#d8d4ce; --border2:#ccc8c2;
  --text:#1a1814; --text2:#6b6560; --text3:#a09890;
  --accent:#2d6a4f; --accent-d:#1b4332; --accent-l:rgba(45,106,79,.10);
  --warn:#a07818; --warn-l:rgba(160,120,24,.10);
  --danger:#b83232; --danger-l:rgba(184,50,50,.10);
  --orange:#c05a10; --orange-l:rgba(192,90,16,.10);
  --info:#1d5fa8; --info-l:rgba(29,95,168,.10);
  --frozen:#1d5fa8; --chilled:#1a7a5e; --dry:#6b6560;
  --font:'Noto Sans KR',sans-serif; --mono:'JetBrains Mono',monospace;
  --r:10px; --r2:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:72px;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo-ico{width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.hlogo-name{font-size:16px;font-weight:700;}
.hlogo-sub{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hstatus{text-align:right;}
.hstatus-time{font-size:10px;color:var(--text3);font-family:var(--mono);}
.hstatus-dot{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--accent);font-weight:600;margin-top:3px;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;gap:3px;cursor:pointer;border:none;
  background:transparent;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:500;transition:color .15s;}
.bn.active{color:var(--accent);}
.bn-ico{font-size:18px;line-height:1;}
.bn-line{width:20px;height:2px;border-radius:1px;background:var(--accent);display:none;margin-top:2px;}
.bn.active .bn-line{display:block;}

/* CONTENT */
.content{padding:14px 14px 0;}
.panel{display:none;}
.panel.active{display:block;animation:fadeUp .18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--text3);}
.loader{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:var(--danger-l);border:1px solid rgba(248,113,113,.3);border-radius:var(--r2);padding:16px;margin-bottom:14px;color:var(--danger);font-size:13px;line-height:1.6;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--surface) 0%,var(--bg2) 100%);
  border:1px solid var(--border2);border-radius:var(--r2);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,222,128,.08) 0%,transparent 70%);}
.hero-label{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.hero-val{font-size:44px;font-weight:900;font-family:var(--mono);color:var(--accent);line-height:1;}
.hero-unit{font-size:14px;color:var(--text2);font-weight:400;margin-left:4px;}
.hero-sub{font-size:11px;color:var(--text3);margin-top:6px;}

/* STATS GRID */
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--c,var(--accent));}
.stat-lbl{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;}
.stat-val{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--c,var(--accent));margin:4px 0 2px;line-height:1;}
.stat-desc{font-size:10px;color:var(--text2);}

/* TYPE SECTION */
.section-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';display:inline-block;width:3px;height:11px;border-radius:2px;background:var(--accent);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.type-row:last-child{margin-bottom:0;}
.type-ico{font-size:16px;width:22px;text-align:center;}
.type-info{flex:1;}
.type-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;}
.type-bar-bg{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.type-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.type-qty{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text2);min-width:52px;text-align:right;}

/* TODAY SECTION */
.today-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);}
.today-row:last-child{border-bottom:none;padding-bottom:0;}
.today-left{display:flex;align-items:center;gap:10px;}
.today-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;}
.t-in{background:var(--accent-l);color:var(--accent);}
.t-out{background:var(--orange-l);color:var(--orange);}
.today-lbl{font-size:10px;color:var(--text3);}
.today-name{font-size:12px;font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.today-big{font-size:22px;font-weight:900;font-family:var(--mono);}
.today-unit{font-size:10px;color:var(--text3);font-weight:400;}

/* ALERT */
.alert-header{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.alert-header::before{content:'';display:inline-block;width:3px;height:11px;border-radius:2px;background:var(--danger);}
.alert-card{border-radius:var(--r);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;border:1px solid;}
.alert-card.d0{background:var(--danger-l);border-color:rgba(248,113,113,.25);}
.alert-card.d7{background:var(--warn-l);border-color:rgba(251,191,36,.2);}
.alert-card.d30{background:var(--surface);border-color:var(--border);}
.alert-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.alert-meta{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono);}
.dday-pill{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;white-space:nowrap;}
.dday-pill.d0{background:var(--danger);color:#fff;}
.dday-pill.d7{background:var(--warn);color:#000;}
.dday-pill.d30{background:var(--surface2);color:var(--text2);}
.alert-qty{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:3px;}
.no-alert{background:var(--accent-l);border:1px solid rgba(74,222,128,.2);border-radius:var(--r);
  padding:13px;display:flex;align-items:center;gap:8px;color:var(--accent);font-size:13px;font-weight:600;}

/* INVENTORY */
.toolbar{display:flex;gap:8px;margin-bottom:10px;}
.search{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;}
.search:focus{border-color:var(--accent);}
.search::placeholder{color:var(--text3);}
.fsel{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 8px;font-family:var(--font);font-size:12px;color:var(--text2);outline:none;}
.fsel option{background:var(--bg2);}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px;}
.item-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.item-name{font-size:14px;font-weight:700;line-height:1.3;}
.item-brand{font-size:11px;color:var(--text3);margin-top:2px;}
.item-total{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.item-unit{font-size:10px;color:var(--text3);}
.type-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;margin-top:3px;}
.tb-frozen{background:rgba(96,165,250,.15);color:var(--frozen);}
.tb-chilled{background:rgba(52,211,153,.15);color:var(--chilled);}
.tb-dry{background:rgba(163,160,154,.15);color:var(--dry);}
.exp-rows{display:flex;flex-direction:column;gap:4px;}
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;background:var(--bg3);}
.exp-row.xdanger{background:var(--danger-l);}
.exp-row.xwarn7{background:var(--warn-l);}
.exp-row.xwarn30{background:rgba(251,146,60,.08);}
.exp-date{font-size:12px;font-family:var(--mono);}
.exp-row.xdanger .exp-date{color:var(--danger);}
.exp-row.xwarn7 .exp-date{color:var(--warn);}
.exp-row.xwarn30 .exp-date{color:var(--orange);}
.exp-note{font-size:9px;font-weight:700;margin-left:5px;padding:1px 4px;border-radius:3px;}
.exp-row.xdanger .exp-note{background:var(--danger);color:#fff;}
.exp-row.xwarn7 .exp-note{background:var(--warn);color:#000;}
.exp-row.xwarn30 .exp-note{color:var(--orange);}
.exp-qty{font-size:15px;font-weight:700;font-family:var(--mono);}
.exp-row.xdanger .exp-qty{color:var(--danger);}
.exp-row.xwarn7 .exp-qty{color:var(--warn);}

/* SLIPS */
.slip-tabs{display:flex;gap:6px;margin-bottom:10px;}
.slip-tab{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.slip-tab.in-active{background:var(--accent-l);color:var(--accent);border-color:transparent;}
.slip-tab.out-active{background:var(--orange-l);color:var(--orange);border-color:transparent;}
.slip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px;}
.slip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.slip-id{font-size:10px;font-family:var(--mono);color:var(--text3);}
.slip-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.in-b{background:var(--accent-l);color:var(--accent);}
.out-b{background:var(--orange-l);color:var(--orange);}
.slip-partner{font-size:15px;font-weight:700;margin-bottom:6px;}
.slip-foot{display:flex;justify-content:space-between;align-items:center;}
.slip-date{font-size:11px;color:var(--text3);font-family:var(--mono);}
.slip-nums{display:flex;gap:16px;}
.slip-num-lbl{font-size:9px;color:var(--text3);}
.slip-num-val{font-size:18px;font-weight:800;font-family:var(--mono);}
.inv{color:var(--accent);}
.outv{color:var(--orange);}

/* EXPIRY PANEL */
.exp-card{background:var(--surface);border-left:3px solid var(--warn);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.exp-card.xdanger{border-left-color:var(--danger);}
.exp-card-head{display:flex;justify-content:space-between;align-items:flex-start;}
.exp-card-name{font-size:13px;font-weight:700;}
.exp-card-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.dday-big{font-size:22px;font-weight:900;font-family:var(--mono);}
.dday-big.dd{color:var(--danger);}
.dday-big.dw{color:var(--warn);}
.dday-big.de{color:var(--text3);}
.exp-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.4;}

/* FAB */
.fab{position:fixed;top:70px;right:14px;z-index:200;background:var(--surface2);
  border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;
  border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .1s;box-shadow:0 2px 8px rgba(0,0,0,.10);}
.fab:active{transform:scale(.93);}
.fab.spinning{animation:spin .7s linear infinite;}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo">
    <div class="hlogo-ico" id="m-logo">🥡</div>
    <div>
      <div class="hlogo-name">식품 WMS</div>
      <div class="hlogo-sub">MANAGER VIEW</div>
    </div>
  </div>
  <div class="hstatus" style="display:flex;align-items:center;gap:8px">
    <button id="m-lang-btn" onclick="toggleLang()" style="background:rgba(255,255,255,.12);border:none;color:#aaa;font-size:10px;padding:4px 8px;border-radius:5px;cursor:pointer;font-family:var(--font)">🌐 KO</button>
    <button onclick="openMobileSettings()" style="background:rgba(255,255,255,.12);border:none;color:#aaa;font-size:10px;padding:4px 8px;border-radius:5px;cursor:pointer;font-family:var(--font)">⚙️</button>
    <div style="text-align:right">
      <div class="hstatus-time" id="last-updated">—</div>
      <div class="hstatus-dot"><span class="pulse"></span>READ ONLY</div>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="loadData()">⟳</button>

<div class="content">
  <div id="error-box" class="error-card" style="display:none"></div>
  <div id="loading" class="loading"><div class="loader"></div><div style="font-size:13px;margin-top:4px">불러오는 중...</div></div>

  <div id="main-content" style="display:none">

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="hero">
        <div class="hero-label">TOTAL STOCK</div>
        <div><span class="hero-val" id="d-total">0</span><span class="hero-unit">ctn</span></div>
        <div class="hero-sub" id="d-summary">—</div>
      </div>
      <div class="stats4">
        <div class="stat-card" style="--c:var(--info)">
          <div class="stat-lbl" data-ml="items_count">등록 품목</div>
          <div class="stat-val" id="d-items">0</div>
          <div class="stat-desc" id="d-items-unit" data-ml="items_unit">개</div>
        </div>
        <div class="stat-card" style="--c:var(--accent)">
          <div class="stat-lbl" data-ml="today_in">오늘 입고</div>
          <div class="stat-val" id="d-in-qty">0</div>
          <div class="stat-desc" id="d-in-cnt">0</div>
        </div>
        <div class="stat-card" style="--c:var(--orange)">
          <div class="stat-lbl" data-ml="today_out">오늘 출고</div>
          <div class="stat-val" id="d-out-qty">0</div>
          <div class="stat-desc" id="d-out-cnt">0</div>
        </div>
        <div class="stat-card" style="--c:var(--danger)">
          <div class="stat-lbl" data-ml="expiry_warn">D-30 이내</div>
          <div class="stat-val" id="d-exp">0</div>
          <div class="stat-desc" id="d-exp-sub" data-ml="exp_sub">임박·만료</div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-title" data-ml="type_ratio">타입별 재고</div>
        <div class="type-row">
          <div class="type-ico">❄️</div>
          <div class="type-info">
            <div class="type-name" data-ml="frozen">냉동</div>
            <div class="type-bar-bg"><div class="type-bar" id="bar-frozen" style="width:0%;background:var(--frozen)"></div></div>
          </div>
          <div class="type-qty" id="qty-frozen">0</div>
        </div>
        <div class="type-row">
          <div class="type-ico">🧊</div>
          <div class="type-info">
            <div class="type-name" data-ml="chilled">냉장</div>
            <div class="type-bar-bg"><div class="type-bar" id="bar-chilled" style="width:0%;background:var(--chilled)"></div></div>
          </div>
          <div class="type-qty" id="qty-chilled">0</div>
        </div>
        <div class="type-row">
          <div class="type-ico">📦</div>
          <div class="type-info">
            <div class="type-name" data-ml="dry">드라이</div>
            <div class="type-bar-bg"><div class="type-bar" id="bar-dry" style="width:0%;background:var(--dry)"></div></div>
          </div>
          <div class="type-qty" id="qty-dry">0</div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-title" data-ml="today_activity">오늘 입출고</div>
        <div class="today-row">
          <div class="today-left">
            <div class="today-badge t-in">↓</div>
            <div>
              <div class="today-lbl" data-ml="stock_in">입고</div>
              <div class="today-name" id="today-in-name">—</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="today-big" style="color:var(--accent)" id="today-in-val">0</div>
            <div class="today-unit">ctn</div>
          </div>
        </div>
        <div class="today-row">
          <div class="today-left">
            <div class="today-badge t-out">↑</div>
            <div>
              <div class="today-lbl" data-ml="stock_out">출고</div>
              <div class="today-name" id="today-out-name">—</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="today-big" style="color:var(--orange)" id="today-out-val">0</div>
            <div class="today-unit">ctn</div>
          </div>
        </div>
      </div>

      <div>
        <div class="alert-header" data-ml="expiry_alerts">유통기한 주의</div>
        <div id="alert-list"></div>
      </div>
    </div>

    <!-- INVENTORY -->
    <div class="panel" id="panel-inventory">
      <div class="toolbar">
        <input class="search" id="inv-q" placeholder="🔍 제품명, 바코드..." oninput="renderInventory()">
        <select class="fsel" id="inv-tf" onchange="renderInventory()">
          <option value="">전체</option>
          <option value="냉동">❄️</option>
          <option value="냉장">🧊</option>
          <option value="드라이">📦</option>
        </select>
      </div>
      <!-- 재고있음/없음 탭 -->
      <div style="display:flex;gap:3px;margin:0 0 10px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px">
        <button id="m-inv-tab-active" onclick="switchMobileInvTab('active',this)"
          style="flex:1;background:#4ade80;color:#0f0e0c;font-size:12px;padding:7px;border-radius:6px;border:none;cursor:pointer;font-weight:700">
          📦 재고있음 <span id="m-inv-cnt-active" style="font-size:10px;opacity:.7"></span>
        </button>
        <button id="m-inv-tab-zero" onclick="switchMobileInvTab('zero',this)"
          style="flex:1;background:transparent;color:#888;font-size:12px;padding:7px;border-radius:6px;border:none;cursor:pointer">

async function gasFetch(url){
  try{
    const res=await fetch(url,{method:'GET',redirect:'follow'});
    const text=await res.text();
    return JSON.parse(text.trim().replace(/^[^(]*\(/,'').replace(/\);?\s*$/,''));
  }catch(e){
    return new Promise((resolve,reject)=>{
      const cb='_wms_'+Date.now();
      const sc=document.createElement('script');
      const tm=setTimeout(()=>{cleanup();reject(new Error('연결 시간 초과'));},12000);
      function cleanup(){clearTimeout(tm);delete window[cb];sc.parentNode&&sc.parentNode.removeChild(sc);}
      window[cb]=d=>{cleanup();resolve(d);};
      sc.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
      sc.onerror=()=>{cleanup();reject(new Error('URL 확인 필요'));};
      document.head.appendChild(sc);
    });
  }
}

const TODAY=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};

function calcStock(){
  const s={};
  // ── adj를 itemId+expiry 기준 최신 1개만 수집 ──
  const adjMap={};
  (DB.adj||[]).forEach(a=>{
    const key=a.itemId+'|'+a.expiry;
    if(!adjMap[key]||a.updatedAt>adjMap[key].updatedAt) adjMap[key]=a;
  });
  // oldExpiry가 다른 경우(유통기한 변경) 구 키 제거
  Object.values(adjMap).forEach(a=>{
    if(a.oldExpiry&&a.oldExpiry!==a.expiry){
      const oldKey=a.itemId+'|'+a.oldExpiry;
      delete adjMap[oldKey];
    }
  });
  // ── adj가 있는 품목+유통기한: adj 확정값 기준으로 계산 ──
  Object.values(adjMap).forEach(a=>{
    if(!s[a.itemId])s[a.itemId]={};
    let delta=0;
    (DB.slips_in||[]).forEach(slip=>slip.lines.forEach(l=>{
      if(l.itemId!==a.itemId||l.expiry!==a.expiry) return;
      const slipTs=slip.createdAt||slip.date+'T23:59:59.999Z';
      if(slipTs>a.updatedAt) delta+=Number(l.qty);
    }));
    (DB.slips_out||[]).forEach(slip=>slip.lines.forEach(l=>{
      if(l.itemId!==a.itemId||l.expiry!==a.expiry) return;
      const slipTs=slip.createdAt||slip.date+'T23:59:59.999Z';
      if(slipTs>a.updatedAt) delta-=Number(l.qty);
    }));
    s[a.itemId][a.expiry]=Number(a.qty)+delta;
  });
  // ── adj 없는 품목+유통기한: 입출고 전표로만 계산 ──
  (DB.slips_in||[]).forEach(slip=>slip.lines.forEach(l=>{
    const key=l.itemId+'|'+l.expiry;
    if(adjMap[key]) return;
    if(!s[l.itemId])s[l.itemId]={};
    s[l.itemId][l.expiry]=(s[l.itemId][l.expiry]||0)+Number(l.qty);
  }));
  (DB.slips_out||[]).forEach(slip=>slip.lines.forEach(l=>{
    const key=l.itemId+'|'+l.expiry;
    if(adjMap[key]) return;
    if(!s[l.itemId])s[l.itemId]={};
    s[l.itemId][l.expiry]=(s[l.itemId][l.expiry]||0)-Number(l.qty);
  }));
  return s;
}

function renderAll(){renderDashboard();renderInventory();renderSlips();renderExpiry();}

function renderDashboard(){
  const stock=calcStock(),today=TODAY();
  let total=0,frozen=0,chilled=0,dry=0,exp30=0,exp90=0,expired=0;

  (DB.items||[]).filter(i=>i.active!==false).forEach(item=>{
    Object.entries(stock[item.id]||{}).forEach(([e,q])=>{
      if(q<=0)return;
      total+=q;
      if(item.type==='냉동')frozen+=q;
      else if(item.type==='냉장')chilled+=q;
      else dry+=q;
      const dl=Math.ceil((new Date(e)-new Date(today))/86400000);
      if(dl<=0)expired++; else if(dl<=30)exp30++; else if(dl<=90)exp90++;
    });
  });

  document.getElementById('d-total').textContent=total.toLocaleString();
  document.getElementById('d-items').textContent=(DB.items||[]).length;
  document.getElementById('d-summary').textContent=
    L('items_count')+' '+(DB.items||[]).length+' '+L('items_unit')+' · '+L('expired')+' '+expired+L('cases')+' · D-30 '+exp30+L('cases');
  document.getElementById('d-exp').textContent=expired+exp30+exp90;

  // 오늘 입출고
  const todayIn=(DB.slips_in||[]).filter(s=>s.date===today);
  const todayOut=(DB.slips_out||[]).filter(s=>s.date===today);
  const inQty=todayIn.reduce((a,s)=>a+s.lines.reduce((b,l)=>b+l.qty,0),0);
  const outQty=todayOut.reduce((a,s)=>a+s.lines.reduce((b,l)=>b+l.qty,0),0);
  document.getElementById('d-in-qty').textContent=inQty.toLocaleString();
  document.getElementById('d-in-cnt').textContent=todayIn.length+(LANG==='id'?' trx':'건');
  document.getElementById('d-out-qty').textContent=outQty.toLocaleString();
  document.getElementById('d-out-cnt').textContent=todayOut.length+(LANG==='id'?' trx':'건');

  if(todayIn.length){
    const names=[...new Set(todayIn.map(s=>(DB.suppliers||[]).find(x=>x.id===s.supplierId)?.name||'—'))];
    document.getElementById('today-in-name').textContent=names.slice(0,2).join(', ')+(names.length>2?(LANG==='id'?' +lainnya '+(names.length-2):' 외 '+(names.length-2)+'곳'):'');
    document.getElementById('today-in-val').textContent=inQty.toLocaleString();
  } else {
    document.getElementById('today-in-name').textContent=LANG==='id'?'Tidak ada masuk':'입고 없음';
    document.getElementById('today-in-val').textContent='0';
  }
  if(todayOut.length){
    const names=[...new Set(todayOut.map(s=>(DB.customers||[]).find(x=>x.id===s.customerId)?.name||'—'))];
    document.getElementById('today-out-name').textContent=names.slice(0,2).join(', ')+(names.length>2?(LANG==='id'?' +lainnya '+(names.length-2):' 외 '+(names.length-2)+'곳'):'');
    document.getElementById('today-out-val').textContent=outQty.toLocaleString();
  } else {
    document.getElementById('today-out-name').textContent=LANG==='id'?'Tidak ada keluar':'출고 없음';
    document.getElementById('today-out-val').textContent='0';
  }

  // 타입 바
  const mx=Math.max(frozen,chilled,dry,1);
  document.getElementById('bar-frozen').style.width=(frozen/mx*100)+'%';
  document.getElementById('bar-chilled').style.width=(chilled/mx*100)+'%';
  document.getElementById('bar-dry').style.width=(dry/mx*100)+'%';
  document.getElementById('qty-frozen').textContent=frozen.toLocaleString()+' ctn';
  document.getElementById('qty-chilled').textContent=chilled.toLocaleString()+' ctn';
  document.getElementById('qty-dry').textContent=dry.toLocaleString()+' ctn';

  // 알림
  const d30l=new Date();d30l.setDate(d30l.getDate()+90);
  let alerts=[];
  (DB.items||[]).filter(i=>i.active!==false).forEach(item=>{
    Object.entries(stock[item.id]||{}).filter(([e,q])=>q>0&&new Date(e)<=d30l).forEach(([e,q])=>{
      const dl=Math.ceil((new Date(e)-new Date(today))/86400000);
      alerts.push({item,expiry:e,qty:q,dl});
    });
  });
  alerts.sort((a,b)=>a.dl-b.dl||b.qty-a.qty);
  const al=document.getElementById('alert-list');
  if(!alerts.length){
    al.innerHTML=`<div class="no-alert">✅&nbsp; ${L('no_alerts')}</div>`;
    return;
  }
  al.innerHTML=alerts.map(a=>{
    const cls=a.dl<=0?'d0':a.dl<=30?'d7':'d30';
    const pill=a.dl<=0?L('expired'):a.dl<=7?'D-'+a.dl:'D-'+a.dl;
    const nm=a.item.name.length>18?a.item.name.slice(0,17)+'…':a.item.name;
    return `<div class="alert-card ${cls}">
      <div style="flex:1;min-width:0">
        <div class="alert-name">${nm}</div>
        <div class="alert-meta">${a.item.brand} · ${fD(a.expiry)} · ${tico(a.item.type)}</div>
      </div>
      <div style="text-align:right;margin-left:10px">
        <div><span class="dday-pill ${cls}">${pill}</span></div>
        <div class="alert-qty">${a.qty.toLocaleString()} ctn</div>
      </div>
    </div>`;
  }).join('');
}

function renderInventory(){
  const q=(document.getElementById('inv-q')?.value||'').toLowerCase();
  const tf=document.getElementById('inv-tf')?.value||'';
  const stock=calcStock(),today=TODAY();
  const allItems=(DB.items||[]).filter(i=>i.active!==false&&(!q||(i.name+i.brand+(i.barcode||'')).toLowerCase().includes(q))&&(!tf||i.type===tf));
  const withStock=[],noStock=[];
  allItems.forEach(i=>{
    const total=Object.values(stock[i.id]||{}).reduce((s,v)=>s+(v>0?v:0),0);
    if(total>0) withStock.push(i); else noStock.push(i);
  });
  const ca=document.getElementById('m-inv-cnt-active');
  const cz=document.getElementById('m-inv-cnt-zero');
  if(ca) ca.textContent='('+withStock.length+')';
  if(cz) cz.textContent='('+noStock.length+')';
  const TAB=window._mobileInvTab||'active';
  const items=TAB==='zero'?noStock:withStock;
  if(!items.length){
    document.getElementById('inv-list').innerHTML='<div class="empty"><div class="empty-ico">'+(TAB==='zero'?'&#10003;':'&#128230;')+'</div>'+(TAB==='zero'?L('no_stock'):L('no_data'))+'</div>';
    return;
  }
  if(TAB==='zero'){
    document.getElementById('inv-list').innerHTML=items.map(item=>`
      <div class="item-card" style="opacity:.6">
        <div class="item-head">
          <div><div class="item-name">${item.name}</div><div class="item-brand">${item.brand} · 입수 ${item.inner}ctn</div></div>
          <div style="text-align:right">
            <div class="item-total" style="color:#666">0<span class="item-unit"> ctn</span></div>
            <span class="type-badge ${tbadge(item.type)}">${tico(item.type)} ${tname(item.type)}</span>
          </div>
        </div>
      </div>`).join('');
    return;
  }
  document.getElementById('inv-list').innerHTML=items.map(item=>{
    const is=stock[item.id]||{};
    const exps=Object.entries(is).filter(([,q])=>q>0).sort(([a],[b])=>a.localeCompare(b));
    const total=exps.reduce((s,[,q])=>s+q,0);
    const expHTML=exps.map(([e,q])=>{
      const dl=Math.ceil((new Date(e)-new Date(today))/86400000);
      const cls=dl<=0?'xdanger':dl<=7?'xwarn7':dl<=30?'xwarn30':'';
      const note=dl<=0?L('expired'):dl<=30?'D-'+dl:'';
      return `<div class="exp-row ${cls}"><span class="exp-date">${e}${note?`<span class="exp-note">${note}</span>`:''}</span><span class="exp-qty">${q.toLocaleString()}<span style="font-size:10px;color:var(--text3)"> ctn</span></span></div>`;
    }).join('');
    return `<div class="item-card">
      <div class="item-head">
        <div><div class="item-name">${item.name}</div><div class="item-brand">${item.brand} · 입수 ${item.inner}ctn</div></div>
        <div style="text-align:right">
          <div class="item-total">${total.toLocaleString()}<span class="item-unit"> ctn</span></div>
          <span class="type-badge ${tbadge(item.type)}">${tico(item.type)} ${tname(item.type)}</span>
        </div>
      </div>
      <div class="exp-rows">${expHTML}</div>
    </div>`;
  }).join('');
}

function switchMobileInvTab(tab,el){
  window._mobileInvTab=tab;
  document.querySelectorAll('#m-inv-tab-active,#m-inv-tab-zero').forEach(b=>{
    b.style.background='transparent'; b.style.color='#888'; b.style.fontWeight='';
  });
  el.style.background='#4ade80'; el.style.color='#0f0e0c'; el.style.fontWeight='700';
  renderInventory();
}

function supTypeBadge(supType){
  const lbl = supType==='local' ? L('sup_local')||'🏠 로컬' : L('sup_import')||'🌐 수입';
  return supType==='local'
    ?`<span style="font-size:10px;background:var(--accent-l);color:var(--accent);padding:1px 6px;border-radius:4px;font-weight:600">${lbl}</span>`
    :`<span style="font-size:10px;background:var(--info-l);color:var(--info);padding:1px 6px;border-radius:4px;font-weight:600">${lbl}</span>`;
}

function renderSlips(){
  const ibQ=(document.getElementById('ib-q-m')?.value||'').toLowerCase();
  const ibType=document.getElementById('ib-type-m')?.value||'';
  const ibDf=document.getElementById('ib-date-from-m')?.value||'';
  const ibDt=document.getElementById('ib-date-to-m')?.value||'';
  const obQ=(document.getElementById('ob-q-m')?.value||'').toLowerCase();
  const obDf=document.getElementById('ob-date-from-m')?.value||'';
  const obDt=document.getElementById('ob-date-to-m')?.value||'';

  let ibs=[...(DB.slips_in||[])].reverse().slice(0,200);
  ibs=ibs.filter(s=>{
    const sup=(DB.suppliers||[]).find(x=>x.id===s.supplierId);
    if(ibQ&&!(sup?sup.name:'').toLowerCase().includes(ibQ)) return false;
    if(ibType&&(sup?.supType||'import')!==ibType) return false;
    if(ibDf&&s.date<ibDf) return false;
    if(ibDt&&s.date>ibDt) return false;
    return true;
  });

  let obs=[...(DB.slips_out||[])].reverse().slice(0,200);
  obs=obs.filter(s=>{
    const cus=(DB.customers||[]).find(x=>x.id===s.customerId);
    if(obQ&&!(cus?cus.name:'').toLowerCase().includes(obQ)) return false;
    if(obDf&&s.date<obDf) return false;
    if(obDt&&s.date>obDt) return false;
    return true;
  });

  document.getElementById('slip-in-list').innerHTML=ibs.length?ibs.map(s=>{
    const sup=(DB.suppliers||[]).find(x=>x.id===s.supplierId);
    return `<div class="slip-card" onclick="openSlipDetail('in','${s.id}')" style="cursor:pointer">
      <div class="slip-head"><span class="slip-badge in-b">↓ 입고</span><span class="slip-id">${s.id}</span>${sup?supTypeBadge(sup.supType):''}<span style="margin-left:auto;font-size:11px;color:var(--text3)">🔍 상세</span></div>
      <div class="slip-partner">${sup?sup.name:'—'}</div>
      <div class="slip-foot"><span class="slip-date">${s.date}</span>
        <div class="slip-nums">
          <div><div class="slip-num-lbl">품목</div><div class="slip-num-val">${s.lines.length}</div></div>
          <div><div class="slip-num-lbl">수량</div><div class="slip-num-val inv">${s.lines.reduce((a,l)=>a+l.qty,0).toLocaleString()}</div></div>
        </div>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-ico">📋</div>${L('no_slip')}</div>`;

  document.getElementById('slip-out-list').innerHTML=obs.length?obs.map(s=>{
    const cus=(DB.customers||[]).find(x=>x.id===s.customerId);
    return `<div class="slip-card" onclick="openSlipDetail('out','${s.id}')" style="cursor:pointer">
      <div class="slip-head"><span class="slip-badge out-b">↑ 출고</span><span class="slip-id">${s.id}</span><span style="margin-left:auto;font-size:11px;color:var(--text3)">🔍 상세</span></div>
      <div class="slip-partner">${cus?cus.name:'—'}</div>
      <div class="slip-foot"><span class="slip-date">${s.date}</span>
        <div class="slip-nums">
          <div><div class="slip-num-lbl">품목</div><div class="slip-num-val">${s.lines.length}</div></div>
          <div><div class="slip-num-lbl">수량</div><div class="slip-num-val outv">${s.lines.reduce((a,l)=>a+l.qty,0).toLocaleString()}</div></div>
        </div>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-ico">📋</div>${L('no_slip')}</div>`;
}

function openSlipDetail(type, id){
  const slip = type==='in'
    ? (DB.slips_in||[]).find(s=>s.id===id)
    : (DB.slips_out||[]).find(s=>s.id===id);
  if(!slip) return;
  const isIn = type==='in';
  const partner = isIn
    ? (DB.suppliers||[]).find(x=>x.id===slip.supplierId)
    : (DB.customers||[]).find(x=>x.id===slip.customerId);
  const totalQty = slip.lines.reduce((a,l)=>a+l.qty,0);
  const color = isIn ? 'var(--accent)' : 'var(--warn)';
  const badgeTxt = isIn ? '↓ 입고' : '↑ 출고';
  const badgeCls = isIn ? 'in-b' : 'out-b';

  const rows = slip.lines.map((l,i)=>{
    const item = (DB.items||[]).find(x=>x.id===l.itemId);
    const dl = Math.ceil((new Date(l.expiry)-new Date(TODAY()))/86400000);
    const dCls = dl<=0?'color:var(--danger)':dl<=30?'color:var(--warn)':'color:var(--text2)';
    const dLbl = dl<=0?'만료':'D-'+dl;
    return `<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0;padding-right:10px">
        <div style="font-weight:600;font-size:13px">${item?item.name:l.itemId}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${item?item.brand:''} ${l.barcode?'· '+l.barcode:''}</div>
        <div style="font-size:11px;margin-top:3px;${dCls}">📅 ${fD(l.expiry)} <span style="font-size:10px">${dLbl}</span></div>
      </div>
      <div style="text-align:right;white-space:nowrap">
        <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:${color}">${l.qty.toLocaleString()}</div>
        <div style="font-size:10px;color:var(--text3)">ctn</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('slip-detail-modal').innerHTML=`
    <div onclick="this.parentNode.style.display='none'" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center">
      <div onclick="event.stopPropagation()" style="background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
        <div style="padding:16px 16px 12px;border-bottom:1px solid var(--border)">
          <div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px"></div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="slip-badge ${badgeCls}">${badgeTxt}</span>
                <span style="font-family:var(--mono);font-size:13px;font-weight:700">${slip.id}</span>
              </div>
              <div style="font-size:12px;color:var(--text3);margin-top:4px">${slip.date} · ${partner?partner.name:'—'}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:800;font-family:var(--mono);color:${color}">${totalQty.toLocaleString()}</div>
              <div style="font-size:10px;color:var(--text3)">${slip.lines.length}품목 · ctn</div>
            </div>
          </div>
        </div>
        <div style="overflow-y:auto;flex:1;padding:0 16px">
          ${rows}
        </div>
        <div style="padding:12px 16px;border-top:1px solid var(--border)">
          <button onclick="document.getElementById('slip-detail-modal').innerHTML='';document.getElementById('slip-detail-modal').style.display='none'" style="width:100%;background:var(--text);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">닫기</button>
        </div>
      </div>
    </div>`;
  document.getElementById('slip-detail-modal').style.display='block';
}


function renderExpiry(){
  const stock=calcStock(),today=TODAY();
  const d90=new Date(); d90.setDate(d90.getDate()+90);
  const urgent=[],warn90=[];
  (DB.items||[]).filter(i=>i.active!==false).forEach(item=>{
    Object.entries(stock[item.id]||{}).filter(([e,q])=>q>0&&new Date(e)<=d90).forEach(([e,q])=>{
      const dl=Math.ceil((new Date(e)-new Date(today))/86400000);
      (dl<=30?urgent:warn90).push({item,expiry:e,qty:q,dl});
    });
  });
  urgent.sort((a,b)=>a.dl-b.dl);
  warn90.sort((a,b)=>a.dl-b.dl);
  const makeCard=r=>`
    <div class="exp-card ${r.dl<=0?'xdanger':''}">
      <div class="exp-card-head">
        <div>
          <div class="exp-card-name">${r.item.name}</div>
          <div class="exp-card-sub">${r.item.brand} &#183; <span class="type-badge ${tbadge(r.item.type)}" style="padding:1px 5px;font-size:9px">${tico(r.item.type)} ${tname(r.item.type)}</span></div>
        </div>
        <div class="dday-big ${r.dl<=0?'de':r.dl<=7?'dd':'dw'}">${r.dl<=0?L('expired'):'D-'+r.dl}</div>
      </div>
      <div class="exp-card-foot">
        <div style="font-size:11px;font-family:var(--mono);color:var(--text3)">&#128197; ${r.expiry}</div>
        <div style="font-size:16px;font-weight:800;font-family:var(--mono)">${r.qty.toLocaleString()} <span style="font-size:10px;color:var(--text3)">ctn</span></div>
      </div>
    </div>`;
  let html='';
  if(urgent.length) html+=`<div style="font-size:11px;font-weight:700;color:#fb923c;padding:8px 4px 4px">&#9888; ${L('d30_within')} (${urgent.length})</div>`+urgent.map(makeCard).join('');
  if(warn90.length) html+=`<div style="font-size:11px;font-weight:700;color:#888;padding:12px 4px 4px">&#128197; ${L('d90_within')} (${warn90.length})</div>`+warn90.map(makeCard).join('');
  document.getElementById('expiry-list').innerHTML=html||`<div class="empty"><div class="empty-ico">&#10003;</div>${L('no_expiry')}</div>`;
}

try{ const s=localStorage.getItem('fwms2_mobile_lang'); if(s) LANG=s; }catch(e){}
